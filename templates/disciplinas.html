<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro das Disciplinas</title>
</head>
<body>
    <h1>Cadastrar Disciplinas</h1>
    <form method="POST" action="/salvar_disciplina">
        <label>Disciplina:</label><br>
        <input type="text" name="nome" required><br><br>

        <label>Sigla:</label><br>
        <input type="text" name="sigla"><br><br>

        <label>Cor:</label><br>
        <input type="text" name="cor"><br><br>

        <label>Carga Horária:</label><br>
        <input type="number" name="carga_horaria_semanal"><br><br>

        <button type="submit">Salvar</button><br><br>

    </form>
    <a href="/">Voltar</a>
</body>
</html>
