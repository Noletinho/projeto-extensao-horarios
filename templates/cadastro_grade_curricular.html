<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Grade Curricular em Lote</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
            max-width: 700px;
        }

        th, td {
            border: 1px solid #999;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        input[type="number"] {
            width: 90px;
        }
    </style>
</head>
<body>
    <h1>Cadastrar Grade Curricular por Turma</h1>

    {% if erro %}
        <p style="color:red;">{{ erro }}</p>
    {% endif %}

    <form method="POST" action="{{ url_for('cadastrar_grade_curricular') }}">
        <label>Turma:</label><br>
        <select name="id_turma" required>
            <option value="">Selecione</option>
            {% for turma in turmas %}
                <option value="{{ turma['id_turma'] }}">
                    {{ turma['nome'] }} - {{ turma['serie'] }} - {{ turma['nome_turno'] }}
                </option>
            {% endfor %}
        </select>

        <br><br>

        <table>
            <tr>
                <th>Disciplina</th>
                <th>Sigla</th>
                <th>Aulas Semanais</th>
            </tr>

            {% for disciplina in disciplinas %}
                <tr>
                    <td>{{ disciplina['nome'] }}</td>
                    <td>{{ disciplina['sigla'] }}</td>
                    <td>
                        <input
                            type="number"
                            name="aulas_semanais_{{ disciplina['id_disciplina'] }}"
                            min="0"
                            placeholder="0"
                        >
                    </td>
                </tr>
            {% endfor %}
        </table>

        <br>
        <button type="submit">Salvar Grade</button>
    </form>

    <br>
    <a href="{{ url_for('index') }}">Voltar</a>
</body>
</html>
