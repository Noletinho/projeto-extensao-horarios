{% extends "base.html" %}
{% block titulo %}Selecionar Turno — Relatório{% endblock %}

{% block conteudo %}
<h1>Selecionar Turno para Relatório</h1>

<div class="card mt-2">
    <div class="flex-linha">
        {% for turno in turnos %}
            <a href="{{ url_for('relatorio_horario_turno', id_turno=turno['id_turno']) }}" class="btn btn-acento">
                {{ turno['nome'] }}
            </a>
        {% endfor %}
    </div>
</div>

<a href="{{ url_for('index') }}" class="link-voltar">← Voltar</a>
{% endblock %}
