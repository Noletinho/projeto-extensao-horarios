{% extends "base.html" %}
{% block titulo %}Selecionar Turno — Relatório{% endblock %}

{% block conteudo %}
<div class="cabecalho-pagina">
    <a href="{{ url_for('index') }}" class="btn btn-secundario">←</a>
    <h1>Gerar Relatório de Grade Horária</h1>
</div>

<div class="card mt-2">
    <form method="GET" id="form-relatorio">
        <div class="form-grupo">
            <label for="nome_escola">Nome da Escola (opcional)</label>
            <input type="text" id="nome_escola" name="nome_escola" placeholder="Ex: E. E. Prof.ª Deuzuita Pereira de Queiroz" style="width:100%;">
        </div>
        <div class="form-grupo">
            <label for="data_rel">Data do Relatório</label>
            <input type="date" id="data_rel" name="data_rel" style="width:220px;">
        </div>
        <div class="form-grupo">
            <label>Selecione o Turno</label>
            <div class="flex-linha" style="flex-wrap:wrap; gap:10px; margin-top:8px;">
                {% for turno in turnos %}
                    <button type="submit" name="id_turno" value="{{ turno['id_turno'] }}" class="btn btn-acento">
                        {{ turno['nome'] }}
                    </button>
                {% endfor %}
            </div>
        </div>
    </form>
</div>

<script>
    // Pré-preencher com data de hoje
    const hoje = new Date();
    const pad = n => String(n).padStart(2,'0');
    document.getElementById('data_rel').value =
        hoje.getFullYear() + '-' + pad(hoje.getMonth()+1) + '-' + pad(hoje.getDate());
</script>
{% endblock %}
