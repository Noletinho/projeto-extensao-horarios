{% extends "base.html" %}
{% block titulo %}Cadastrar Alocação{% endblock %}

{% block conteudo %}
<div class="cabecalho-pagina">
    <a href="{{ url_for('selecionar_turno_alocacoes') }}" class="btn btn-secundario">← Voltar</a>
    <h1>Cadastrar Alocação</h1>
</div>

<div class="card">
    <form method="POST" action="{{ url_for('cadastrar_alocacao') }}">
        <div class="form-grupo">
            <label>Turma:</label>
            <select name="id_turma" required>
                <option value="">Selecione</option>
                {% for turma in turmas %}
                    <option value="{{ turma['id_turma'] }}">
                        {{ turma['nome'] }} - {{ turma['serie'] }} - {{ turma['nome_turno'] }}
                    </option>
                {% endfor %}
            </select>
        </div>
        <div class="form-grupo">
            <label>Disciplina:</label>
            <select name="id_disciplina" required>
                <option value="">Selecione</option>
                {% for disciplina in disciplinas %}
                    <option value="{{ disciplina['id_disciplina'] }}">
                        {{ disciplina['nome'] }} ({{ disciplina['sigla'] }})
                    </option>
                {% endfor %}
            </select>
        </div>
        <div class="form-grupo">
            <label>Professor:</label>
            <select name="id_professor" required>
                <option value="">Selecione</option>
                {% for professor in professores %}
                    <option value="{{ professor['id_professor'] }}">{{ professor['nome'] }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-grupo">
            <label>Local:</label>
            <select name="id_local" required>
                <option value="">Selecione</option>
                {% for local in locais %}
                    <option value="{{ local['id_local'] }}">{{ local['nome'] }} ({{ local['tipo'] }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-grupo">
            <label>Dia da Semana:</label>
            <select name="dia_semana" required>
                <option value="">Selecione</option>
                <option value="segunda">Segunda</option>
                <option value="terca">Terça</option>
                <option value="quarta">Quarta</option>
                <option value="quinta">Quinta</option>
                <option value="sexta">Sexta</option>
            </select>
        </div>
        <div class="form-grupo">
            <label>Horários <small style="color:var(--cor-texto-claro)">(Ctrl+clique para selecionar vários)</small></label>
            <select name="id_horarios" multiple required size="6" style="height:auto">
                {% for horario in horarios %}
                    {% if not horario['eh_intervalo'] %}
                    <option value="{{ horario['id_horario'] }}">
                        {{ horario['hora_inicio'] }} às {{ horario['hora_fim'] }}
                    </option>
                    {% endif %}
                {% endfor %}
            </select>
        </div>
        <button type="submit">Salvar</button>
    </form>
</div>

{% endblock %}
