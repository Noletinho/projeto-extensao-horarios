<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Professor x Disciplina</title>
</head>
<body>
    <h1>Cadastrar Relação Professor x Disciplina</h1>

    {% if erro %}
    <p style="color:red;">{{ erro }}</p>
    {% endif %}

    <form method="POST" action="{{ url_for('cadastrar_professor_disciplina') }}">
        <label>Professor:</label><br>
        <select name="id_professor" required>
            <option value="">Selecione</option>
            {% for professor in professores %}
                <option value="{{ professor['id_professor'] }}">
                    {{ professor['nome'] }}
                </option>
            {% endfor %}
        </select><br><br>

        <label>Disciplina:</label><br>
        <select name="id_disciplina" required>
            <option value="">Selecione</option>
            {% for disciplina in disciplinas %}
                <option value="{{ disciplina['id_disciplina'] }}">
                    {{ disciplina['nome'] }} ({{ disciplina['sigla'] }})
                </option>
            {% endfor %}
        </select><br><br>

        <button type="submit">Salvar</button>
    </form>

    <br>
    <a href="{{ url_for('index') }}">Voltar</a>
</body>
</html>
