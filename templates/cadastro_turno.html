{% extends "base.html" %}
{% block titulo %}Cadastrar Turno{% endblock %}

{% block conteudo %}
<div class="cabecalho-pagina">
    <a href="{{ url_for('index') }}" class="btn btn-secundario">← Voltar</a>
    <h1>Cadastrar Turno</h1>
</div>

<div class="layout-duplo">
    <div class="card">
        <form method="POST" action="{{ url_for('salvar_turno') }}">
            <div class="form-grupo">
                <label>Nome do Turno <span style="color:var(--cor-erro)">*</span></label>
                <input type="text" name="nome" required autofocus placeholder="Ex: Matutino, Vespertino...">
            </div>
            <button type="submit">Salvar</button>
        </form>
    </div>

    <div>
        <h2>Turnos Cadastrados</h2>
        {% if turnos %}
        <table class="tabela-lateral">
            <thead>
                <tr><th>Nome</th></tr>
            </thead>
            <tbody>
                {% for t in turnos %}
                <tr><td>{{ t['nome'] }}</td></tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <p style="color:var(--cor-texto-claro)">Nenhum turno cadastrado ainda.</p>
        {% endif %}
    </div>
</div>
{% endblock %}
