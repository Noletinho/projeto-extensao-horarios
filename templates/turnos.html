<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Turnos</title>
</head>
<body>
   <h1>Lista de Turnos</h1>

   <a href="{{ url_for('cadastrar_turno') }}">
        <button>Cadastrar Novo Turno</button>
    </a>

    <table border="1" cellpadding="8">
        <tr>
            <th>ID</th>
            <th>Turnos</th>
        </tr>

        {% for turno in turnos %}
        <tr>
            <td>{{ turno['id_turno'] }}</td>
            <td>{{ turno['nome'] }}</td>

            <td>
                <a href="{{ url_for('editar_turno', id_turno=turno[0]) }}">
                    <button type="button">Editar</button>
                </a>
                
                <form action="{{ url_for('deletar_turno', id_turno=turno[0]) }}" method="POST" style="display:inline;">
                    <button type="submit" onclick="return confirm('Tem certeza que deseja excluir?')">Excluir</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>

    {% if turno_edicao %}
        <hr>
        <h2>Editar Turno</h2>

        <form method="POST" action="{{ url_for('atualizar_turno', id_turno=turno_edicao['id_turno']) }}">
            <label>Turno:</label><br>
            <input type="text" name="nome" value="{{ turno_edicao['nome'] }}" required><br><br>

            <button type="submit">Atualizar</button>
        </form>
    {% endif %}

    <br>
    <a href="{{ url_for('index') }}">Voltar</a> 
</body>
</html>
