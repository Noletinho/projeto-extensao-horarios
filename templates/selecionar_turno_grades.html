{% extends "base.html" %}
{% block titulo %}Selecionar Turno — Grades{% endblock %}

{% block conteudo %}
<h1>Selecionar Turno para Ver as Grades Curriculares</h1>

<div class="card mt-2">
    <div class="flex-linha">
        {% for turno in turnos %}
            <a href="{{ url_for('listar_grades_curriculares', id_turno=turno['id_turno']) }}" class="btn btn-primario">
                {{ turno['nome'] }}
            </a>
        {% endfor %}
    </div>
</div>

<a href="{{ url_for('index') }}" class="link-voltar">← Voltar</a>
{% endblock %}
